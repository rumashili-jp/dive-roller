<!DOCTYPE html>
<html lang="ja" class="overflow-x-hidden">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サイコロロールシミュレーター</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* 横スクロール（謎の余白）を完全に防ぐための設定 */
    html, body {
      max-width: 100vw;
      overflow-x: hidden;
    }

    /* 3D効果 */
    .dice-perspective {
      perspective: 1000px;
    }
    .dice-card {
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
    }

    /* レインボーエフェクト（最大値用） */
    @keyframes rainbow-glow {
      0% { border-color: #ef4444; box-shadow: 0 0 20px #ef4444, inset 0 0 8px #ef4444; }
      20% { border-color: #eab308; box-shadow: 0 0 20px #eab308, inset 0 0 8px #eab308; }
      40% { border-color: #10b981; box-shadow: 0 0 20px #10b981, inset 0 0 8px #10b981; }
      60% { border-color: #3b82f6; box-shadow: 0 0 20px #3b82f6, inset 0 0 8px #3b82f6; }
      80% { border-color: #8b5cf6; box-shadow: 0 0 20px #8b5cf6, inset 0 0 8px #8b5cf6; }
      100% { border-color: #ef4444; box-shadow: 0 0 20px #ef4444, inset 0 0 8px #ef4444; }
    }
    .rainbow-effect {
      animation: rainbow-glow 1.5s linear infinite !important;
      border-width: 3px !important;
    }

    /* 虹色の炎・オーラの回転演出 */
    @keyframes rotate-gradient {
      0% { transform: scale(1.1) rotate(0deg); filter: hue-rotate(0deg) blur(12px); }
      50% { transform: scale(1.2) rotate(180deg); filter: hue-rotate(180deg) blur(16px); }
      100% { transform: scale(1.1) rotate(360deg); filter: hue-rotate(360deg) blur(12px); }
    }
    .animate-rainbow-aura {
      background: linear-gradient(45deg, #ff0055, #00ff55, #0055ff, #ff0055, #ff0055);
      background-size: 200% 200%;
      animation: rotate-gradient 4s linear infinite;
    }

    /* 衝撃波（ショックウェーブ）のアニメーション */
    @keyframes shockwave-expand {
      0% {
        transform: translate(-50%, -50%) scale(0.5);
        opacity: 0.8;
        border-width: 8px;
        filter: blur(0px);
      }
      100% {
        transform: translate(-50%, -50%) scale(6.0);
        opacity: 0;
        border-width: 0.5px;
        filter: blur(6px);
      }
    }
    .shockwave {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      border-style: solid;
      border-radius: 1.5rem;
      pointer-events: none;
      z-index: 10;
      transform: translate(-50%, -50%) scale(0.5);
      opacity: 0;
    }
    .animate-shockwave {
      animation: shockwave-expand 0.8s linear forwards;
    }

    /* 各カラーの衝撃波リング */
    .shockwave-slate {
      border-color: rgba(148, 163, 184, 0.4);
      box-shadow: 0 0 20px rgba(148, 163, 184, 0.2);
    }
    .shockwave-emerald {
      border-color: rgba(16, 185, 129, 0.5);
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.25);
    }
    .shockwave-blue {
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 0 25px rgba(59, 130, 246, 0.25);
    }
    .shockwave-yellow {
      border-color: rgba(234, 179, 8, 0.5);
      box-shadow: 0 0 30px rgba(234, 179, 8, 0.3);
    }
    .shockwave-red {
      border-color: rgba(239, 68, 68, 0.5);
      box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
    }

    /* レインボー衝撃波 */
    @keyframes rainbow-shockwave-border {
      0% { 
        border-color: rgba(236, 72, 153, 0.95); 
        box-shadow: 0 0 45px rgba(236, 72, 153, 0.85), inset 0 0 25px rgba(236, 72, 153, 0.5); 
      }
      25% { 
        border-color: rgba(59, 130, 246, 0.95); 
        box-shadow: 0 0 45px rgba(59, 130, 246, 0.85), inset 0 0 25px rgba(59, 130, 246, 0.5); 
      }
      50% { 
        border-color: rgba(16, 185, 129, 0.95); 
        box-shadow: 0 0 45px rgba(16, 185, 129, 0.85), inset 0 0 25px rgba(16, 185, 129, 0.5); 
      }
      75% { 
        border-color: rgba(234, 179, 8, 0.95); 
        box-shadow: 0 0 45px rgba(234, 179, 8, 0.85), inset 0 0 25px rgba(234, 179, 8, 0.5); 
      }
      100% { 
        border-color: rgba(236, 72, 153, 0.95); 
        box-shadow: 0 0 45px rgba(236, 72, 153, 0.85), inset 0 0 25px rgba(236, 72, 153, 0.5); 
      }
    }
    .shockwave-rainbow {
      background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 70%);
    }

    .animate-shockwave.shockwave-rainbow {
      animation: shockwave-expand 0.7s linear forwards, rainbow-shockwave-border 0.7s linear infinite;
    }

    /* イベント発生時のアニメーション演出用 */
    @keyframes slash-in {
      0% { transform: translateY(-50%) scaleX(0); opacity: 0; }
      15% { transform: translateY(-50%) scaleX(1.2); opacity: 1; }
      30% { transform: translateY(-50%) scaleX(1); }
      70% { transform: translateY(-50%) scaleX(1); opacity: 1; }
      85% { transform: translateY(-50%) scaleX(1.2); opacity: 1; }
      100% { transform: translateY(-50%) scaleX(0); opacity: 0; }
    }

    @keyframes text-impact {
      0% { transform: scale(3); opacity: 0; filter: blur(10px); }
      10% { transform: scale(1); opacity: 1; filter: blur(0px); }
      90% { transform: scale(1); opacity: 1; filter: blur(0px); }
      100% { transform: scale(0.8); opacity: 0; filter: blur(5px); }
    }

    @keyframes particle-explode {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }

    .animate-slash {
      animation: slash-in 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .animate-impact {
      animation: text-impact 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .particle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      background: #facc15;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 10px #facc15, 0 0 20px #eab308;
      animation: particle-explode 2s cubic-bezier(0.1, 0.8, 0.1, 1) forwards;
    }
  </style>
</head>
<body class="bg-white text-slate-900 min-h-screen flex flex-col justify-between font-sans selection:bg-slate-800 selection:text-white transition-colors duration-300 overflow-x-hidden w-full relative">

  <!-- ヘッダー -->
  <header class="w-full max-w-4xl mx-auto px-6 py-4 flex justify-between items-center border-b border-slate-200 transition-colors duration-300">
    <div class="flex items-center gap-2">
      <i id="headerIcon" class="fa-solid fa-dice text-2xl text-slate-900 transition-colors duration-300"></i>
      <h1 id="headerTitle" class="text-xl font-bold tracking-wider text-slate-900 transition-colors duration-300">DICE ROLLER</h1>
    </div>
    <!-- ターン数表示エリア -->
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-1.5 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-750 px-3 py-1.5 rounded-xl transition-all duration-300 shadow-sm">
        <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Turn</span>
        <span id="turnCounter" class="text-lg font-black text-slate-800 dark:text-slate-100 min-w-[20px] text-center">1</span>
      </div>
      <!-- 設定ボタン -->
      <button id="settingsBtn" class="p-2 rounded-full text-slate-700 hover:bg-slate-100 hover:text-slate-900 transition-all duration-200 focus:outline-none" aria-label="設定を開く">
        <i class="fa-solid fa-gear text-xl"></i>
      </button>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="flex-grow flex flex-col items-center justify-center p-4 w-full relative">
    
    <!-- サイコロエリア -->
    <div id="diceGrid" class="flex flex-row gap-4 sm:gap-8 justify-center items-center w-full max-w-full mb-12 dice-perspective">
      
      <!-- 左：1組 (c1) -->
      <div class="flex flex-col items-center gap-2 sm:gap-4 flex-1 max-w-[200px]">
        <span class="text-[10px] sm:text-xs font-semibold tracking-wider text-slate-500 bg-slate-100/80 px-2 sm:px-3 py-1 rounded-full border border-slate-200 text-center truncate w-full">GROUP 1 (c1)</span>
        <div id="diceWrapper1" class="relative">
          <div id="diceAura1" class="absolute -inset-1.5 rounded-2xl opacity-0 blur-md transition-all duration-150"></div>
          <div id="diceShockwave1" class="shockwave"></div>
          <div id="diceContainer1" class="relative w-20 h-20 sm:w-28 sm:h-28 bg-white rounded-2xl flex items-center justify-center shadow-lg border-2 border-slate-300 dice-card cursor-default transition-all duration-150">
            <span id="diceValue1" class="text-3xl sm:text-5xl font-black text-slate-950 select-none transition-all duration-150">1</span>
          </div>
        </div>
      </div>

      <!-- 真ん中：2組 (c2) -->
      <div class="flex flex-col items-center gap-2 sm:gap-4 flex-1 max-w-[200px]">
        <span class="text-[10px] sm:text-xs font-semibold tracking-wider text-slate-500 bg-slate-100/80 px-2 sm:px-3 py-1 rounded-full border border-slate-200 text-center truncate w-full">GROUP 2 (c2)</span>
        <div id="diceWrapper2" class="relative">
          <div id="diceAura2" class="absolute -inset-1.5 rounded-2xl opacity-0 blur-md transition-all duration-150"></div>
          <div id="diceShockwave2" class="shockwave"></div>
          <div id="diceContainer2" class="relative w-20 h-20 sm:w-28 sm:h-28 bg-white rounded-2xl flex items-center justify-center shadow-lg border-2 border-slate-300 dice-card cursor-default transition-all duration-150">
            <span id="diceValue2" class="text-3xl sm:text-5xl font-black text-slate-950 select-none transition-all duration-150">1</span>
          </div>
        </div>
      </div>

      <!-- 右：3組 (c3) -->
      <div class="flex flex-col items-center gap-2 sm:gap-4 flex-1 max-w-[200px]">
        <span class="text-[10px] sm:text-xs font-semibold tracking-wider text-slate-500 bg-slate-100/80 px-2 sm:px-3 py-1 rounded-full border border-slate-200 text-center truncate w-full">GROUP 3 (c3)</span>
        <div id="diceWrapper3" class="relative">
          <div id="diceAura3" class="absolute -inset-1.5 rounded-2xl opacity-0 blur-md transition-all duration-150"></div>
          <div id="diceShockwave3" class="shockwave"></div>
          <div id="diceContainer3" class="relative w-20 h-20 sm:w-28 sm:h-28 bg-white rounded-2xl flex items-center justify-center shadow-lg border-2 border-slate-300 dice-card cursor-default transition-all duration-150">
            <span id="diceValue3" class="text-3xl sm:text-5xl font-black text-slate-950 select-none transition-all duration-150">1</span>
          </div>
        </div>
      </div>

    </div>

    <!-- ロールボタンとリセットボタン -->
    <div class="flex flex-col items-center gap-4">
      <div class="flex items-center gap-3">
        <button id="rollBtn" class="relative group px-12 py-5 bg-slate-900 rounded-2xl font-extrabold text-xl tracking-widest text-white shadow-xl hover:bg-slate-850 active:scale-95 transition-all duration-150 overflow-hidden">
          <span class="relative z-10 flex items-center gap-2">
            <i class="fa-solid fa-play"></i> ROLL
          </span>
          <span class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></span>
        </button>
        
        <!-- ターンリセットボタン -->
        <button id="resetTurnBtn" class="p-4 bg-slate-100 hover:bg-slate-200 text-slate-600 hover:text-slate-850 rounded-2xl transition-all duration-150 border border-slate-200 shadow-md active:scale-95" title="ターン数を初期化">
          <i class="fa-solid fa-rotate-left text-lg"></i>
        </button>
      </div>
      <div id="statusText" class="text-xs text-slate-500 h-4">ボタンを押してサイコロを振ろう</div>
    </div>
  </main>

  <!-- フッター -->
  <footer class="w-full text-center py-4 text-xs text-slate-500 border-t border-slate-200 transition-colors duration-300">
    &copy; 2026 Dice Roller Simulation.
  </footer>

  <!-- イベント発生エフェクトオーバーレイ (VALO / Splatoon風) -->
  <div id="eventOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center z-40 pointer-events-none">
    <!-- 斜めのスリット背景 -->
    <div id="eventSlash" class="absolute left-0 right-0 h-32 md:h-40 bg-gradient-to-r from-red-600 via-amber-500 to-yellow-500 -skew-y-3 shadow-[0_0_50px_rgba(234,179,8,0.5)] flex items-center justify-center opacity-0 top-1/2 overflow-hidden">
      <!-- パーティクルコンテナ -->
      <div id="particleContainer" class="absolute inset-0 overflow-hidden"></div>
    </div>
    <!-- 中央の巨大文字 -->
    <div id="eventText" class="text-center z-50 opacity-0 select-none scale-150">
      <div class="text-[10px] md:text-sm font-black tracking-[0.4em] text-white/90 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] uppercase">Warning !</div>
      <h2 class="text-5xl md:text-8xl font-black text-yellow-300 tracking-wider font-sans drop-shadow-[0_5px_15px_rgba(0,0,0,0.9)] italic">
        全校集会発生！！
      </h2>
      <div id="eventSubtext" class="text-xs md:text-lg font-bold text-white tracking-[0.2em] mt-1 md:mt-2 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]">
        SPECIAL EVENT OCCURRED!
      </div>
    </div>
  </div>

  <!-- 設定用モーダル -->
  <div id="settingsModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 hidden z-50">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-200">
      <div class="px-6 py-4 border-b border-slate-700 flex justify-between items-center">
        <h2 class="font-bold text-lg flex items-center gap-2 text-slate-100">
          <i class="fa-solid fa-sliders text-indigo-400"></i> 設定
        </h2>
        <button id="closeSettingsBtn" class="text-slate-400 hover:text-white transition-colors">
          <i class="fa-solid fa-xmark text-lg"></i>
        </button>
      </div>
      <div class="p-6 space-y-4 max-h-[70vh] overflow-y-auto">
        <!-- c1 -->
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">GROUP 1 (c1) 内訳 (カンマ区切り、範囲指定は「~」)</label>
          <input type="text" id="inputC1" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm" placeholder="1,2,3,4,5,6 または 1~100">
        </div>
        <!-- c2 -->
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">GROUP 2 (c2) 内訳 (カンマ区切り、範囲指定は「~」)</label>
          <input type="text" id="inputC2" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm" placeholder="1,2,3,4,5,6 または 1~100">
        </div>
        <!-- c3 -->
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">GROUP 3 (c3) 内訳 (カンマ区切り、範囲指定は「~」)</label>
          <input type="text" id="inputC3" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm" placeholder="1,2,3,3,3,9 または 1~100">
        </div>
        <!-- 背景画像パス -->
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1">背景画像のURL/パス (空欄で白背景)</label>
          <input type="text" id="inputBgUrl" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm" placeholder="https://example.com/image.png">
        </div>

        <!-- ON/OFF エフェクト設定スイッチトグル & 音量スライダー -->
        <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-750 space-y-4">
          <h3 class="text-xs font-bold text-slate-300 uppercase tracking-widest border-b border-slate-750 pb-1.5"><i class="fa-solid fa-wand-magic-sparkles text-indigo-400"></i> エフェクト個別設定</h3>
          
          <!-- 各個別チェックボックス -->
          <div class="space-y-3">
            <!-- 衝撃波 -->
            <div class="flex items-center justify-between">
              <span class="text-xs font-semibold text-slate-400">確定時の衝撃波（ショックウェーブ）</span>
              <label class="relative inline-flex items-center cursor-pointer select-none">
                <input type="checkbox" id="checkShockwave" class="sr-only peer" checked>
                <div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
              </label>
            </div>
            <!-- 背面オーラ -->
            <div class="flex items-center justify-between">
              <span class="text-xs font-semibold text-slate-400">確定時の背面オーラ</span>
              <label class="relative inline-flex items-center cursor-pointer select-none">
                <input type="checkbox" id="checkAura" class="sr-only peer" checked>
                <div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
              </label>
            </div>
            <!-- 縁の色 -->
            <div class="flex items-center justify-between">
              <span class="text-xs font-semibold text-slate-400">確定時のサイコロの縁の色（影と枠色）</span>
              <label class="relative inline-flex items-center cursor-pointer select-none">
                <input type="checkbox" id="checkBorderColor" class="sr-only peer" checked>
                <div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
              </label>
            </div>
          </div>

          <!-- 音量設定スライダー -->
          <div class="border-t border-slate-750 pt-3 space-y-2">
            <div class="flex justify-between items-center">
              <span class="text-xs font-bold text-slate-300 flex items-center gap-1.5">
                <i class="fa-solid fa-volume-high text-indigo-400"></i> 効果音の音量
              </span>
              <span id="volumeValue" class="text-xs font-mono font-bold text-indigo-400">20</span>
            </div>
            <div class="flex items-center gap-3">
              <i class="fa-solid fa-volume-off text-xs text-slate-500"></i>
              <input type="range" id="inputVolume" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500" min="0" max="100" value="20">
              <i class="fa-solid fa-volume-high text-xs text-slate-500"></i>
            </div>
          </div>
        </div>

        <!-- ターン設定と追加設定 -->
        <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-750 space-y-3">
          <h3 class="text-xs font-bold text-slate-300 uppercase tracking-widest border-b border-slate-750 pb-1.5"><i class="fa-solid fa-clock"></i> ターン & イベント設定</h3>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[10px] font-semibold text-slate-400 mb-1">現在のターン数</label>
              <input type="number" id="inputTurn" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-white focus:outline-none focus:border-indigo-500 text-xs" min="1" value="1">
            </div>
            <div>
              <label class="block text-[10px] font-semibold text-slate-400 mb-1">イベント周期 (何ターンごと)</label>
              <input type="number" id="inputEventInterval" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-white focus:outline-none focus:border-indigo-500 text-xs" min="1" value="5">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 border-t border-slate-700/50 pt-2">
            <div>
              <label class="block text-[10px] font-semibold text-slate-400 mb-1">イベント発生トリガー</label>
              <select id="inputEventTrigger" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-white focus:outline-none focus:border-indigo-500 text-xs">
                <option value="end">ロール終了時</option>
                <option value="start">ロール開始時</option>
              </select>
            </div>
            <div class="flex flex-col justify-center">
              <label class="block text-[10px] font-semibold text-slate-400 mb-1">イベント後のターンリセット</label>
              <label class="relative inline-flex items-center cursor-pointer select-none">
                <input type="checkbox" id="checkResetTurnOnEvent" class="sr-only peer" checked>
                <div class="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
                <span class="ml-2 text-xs font-semibold text-slate-400 peer-checked:text-indigo-400 transition-colors" id="textResetTurnOnEvent">有効</span>
              </label>
            </div>
          </div>
        </div>

        <!-- サイコロの配置（幅）設定 -->
        <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-750 space-y-3">
          <div class="flex justify-between items-center border-b border-slate-750 pb-1.5">
            <h3 class="text-xs font-bold text-slate-300 uppercase tracking-widest"><i class="fa-solid fa-arrows-left-right text-indigo-400"></i> サイコロの幅（間隔）</h3>
            <span id="gapValueDisplay" class="text-xs font-mono font-bold text-indigo-400">160</span>
          </div>
          <div class="flex items-center gap-3">
            <input type="range" id="inputDiceGapRange" class="w-full h-1.5 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500" min="0" max="400" value="160">
            <input type="number" id="inputDiceGapNumber" class="w-16 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1 text-white focus:outline-none focus:border-indigo-500 text-xs text-center" min="0" max="400" value="160">
          </div>
        </div>

        <!-- Speed & Border & Power -->
        <div class="grid grid-cols-3 gap-2">
          <div>
            <label class="block text-[10px] font-semibold text-slate-400 mb-1">初期速度(Speed)</label>
            <input type="number" id="inputSpeed" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-white focus:outline-none focus:border-indigo-500 text-xs" min="10" max="500" value="120">
          </div>
          <div>
            <label class="block text-[10px] font-semibold text-slate-400 mb-1">閾値(border)</label>
            <input type="number" id="inputBorder" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-white focus:outline-none focus:border-indigo-500 text-xs" min="1" max="200" value="90">
          </div>
          <div>
            <label class="block text-[10px] font-semibold text-slate-400 mb-1">緩急レベル</label>
            <input type="number" id="inputPower" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-2 py-2 text-white focus:outline-none focus:border-indigo-500 text-xs" min="1" max="10" value="3">
          </div>
        </div>
      </div>
      <div class="px-6 py-4 bg-slate-900/50 border-t border-slate-700 flex justify-end gap-3">
        <button id="resetDefaultsBtn" class="px-4 py-2 bg-slate-800 text-slate-300 hover:text-white rounded-lg text-sm hover:bg-slate-700 transition-colors">初期値に戻す</button>
        <button id="saveSettingsBtn" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-sm font-bold transition-colors">設定を保存</button>
      </div>
    </div>
  </div>

  <script>
    // 初期設定データ
    let c1 = [1, 2, 3, 4, 5, 6];
    let c2 = [1, 2, 3, 4, 5, 6];
    let c3 = [1, 2, 3, 3, 3, 9];
    let baseRollSpeed = 120;
    let rollSpeed = 0;      
    let border = 90;        
    let easePower = 3;      
    let bgImageUrl = "./IMG_3640.png";    
    
    // ターン管理のデータと追加設定データ
    let currentTurn = 1;
    let eventInterval = 5;  
    let eventTrigger = "end"; 
    let resetTurnOnEvent = true; 
    let diceGap = 160; 

    // 個別のエフェクトON/OFFステート
    let enableShockwave = true;
    let enableAura = true;
    let enableBorderColor = true;

    // 音量管理 (0 ~ 100, 初期値20)
    let sfxVolume = 20;

    // Web Audio API
    let audioCtx = null;

    function playClickSound(index = 0) {
      try {
        if (sfxVolume <= 0) return;

        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        const pitchFactor = 1 + (index * 0.12);
        const baseFreq = 1600 * pitchFactor * (0.95 + Math.random() * 0.1);
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.025);
        
        const volumeFactor = sfxVolume / 100;
        gain.gain.setValueAtTime(0.2 * volumeFactor, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.025);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.03);
      } catch (e) {
        console.debug("Audio play failed:", e);
      }
    }

    function playConfirmSound(tier = 0) {
      try {
        if (sfxVolume <= 0) return;

        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        const volumeFactor = sfxVolume / 100;

        if (tier === 5) {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(700, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(2200, audioCtx.currentTime + 0.12);
          
          gain.gain.setValueAtTime(0.4 * volumeFactor, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        } else {
          osc.type = 'triangle';
          const freq = 380 + (tier * 60);
          osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.06);
          
          gain.gain.setValueAtTime(0.3 * volumeFactor, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.07);
        }
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.25);
      } catch (e) {
        console.debug("Audio play failed:", e);
      }
    }

    function dice(data = [1, 2, 3, 4, 5, 6]) {
      return data[Math.floor(Math.random() * data.length)];
    }

    function parseDiceInput(value) {
      const parts = value.split(',');
      let result = [];
      
      parts.forEach(part => {
        const trimmed = part.trim();
        if (trimmed.includes('~')) {
          const range = trimmed.split('~');
          if (range.length === 2) {
            const start = Number(range[0].trim());
            const end = Number(range[1].trim());
            if (!isNaN(start) && !isNaN(end)) {
              const min = Math.min(start, end);
              const max = Math.max(start, end);
              for (let i = min; i <= max; i++) {
                result.push(i);
              }
            }
          }
        } else {
          if (trimmed !== "") {
            result.push(isNaN(trimmed) ? trimmed : Number(trimmed));
          }
        }
      });
      
      return result.length > 0 ? result : [1];
    }

    const rollBtn = document.getElementById('rollBtn');
    const resetTurnBtn = document.getElementById('resetTurnBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const saveSettingsBtn = document.getElementById('saveSettingsBtn');
    const resetDefaultsBtn = document.getElementById('resetDefaultsBtn');
    const statusText = document.getElementById('statusText');
    const turnCounter = document.getElementById('turnCounter');

    const eventOverlay = document.getElementById('eventOverlay');
    const eventSlash = document.getElementById('eventSlash');
    const eventText = document.getElementById('eventText');
    const particleContainer = document.getElementById('particleContainer');

    const diceValue1 = document.getElementById('diceValue1');
    const diceValue2 = document.getElementById('diceValue2');
    const diceValue3 = document.getElementById('diceValue3');

    const containers = [
      document.getElementById('diceContainer1'),
      document.getElementById('diceContainer2'),
      document.getElementById('diceContainer3')
    ];

    const diceStates = [
      { element: diceValue1, container: containers[0], data: () => c1, t: 0, bt: 0 },
      { element: diceValue2, container: containers[1], data: () => c2, t: 0, bt: 0 },
      { element: diceValue3, container: containers[2], data: () => c3, t: 0, bt: 0 }
    ];

    const diceGrid = document.getElementById('diceGrid');
    const inputC1 = document.getElementById('inputC1');
    const inputC2 = document.getElementById('inputC2');
    const inputC3 = document.getElementById('inputC3');
    const inputBgUrl = document.getElementById('inputBgUrl');
    const inputSpeed = document.getElementById('inputSpeed');
    const inputBorder = document.getElementById('inputBorder');
    const inputPower = document.getElementById('inputPower');
    const inputTurn = document.getElementById('inputTurn');
    const inputEventInterval = document.getElementById('inputEventInterval');
    const inputEventTrigger = document.getElementById('inputEventTrigger');
    const checkResetTurnOnEvent = document.getElementById('checkResetTurnOnEvent');
    const textResetTurnOnEvent = document.getElementById('textResetTurnOnEvent');
    const inputDiceGapRange = document.getElementById('inputDiceGapRange');
    const inputDiceGapNumber = document.getElementById('inputDiceGapNumber');
    const gapValueDisplay = document.getElementById('gapValueDisplay');

    const checkShockwave = document.getElementById('checkShockwave');
    const checkAura = document.getElementById('checkAura');
    const checkBorderColor = document.getElementById('checkBorderColor');
    const inputVolume = document.getElementById('inputVolume');
    const volumeValue = document.getElementById('volumeValue');

    function syncSettingsToForm() {
      inputC1.value = c1.join(',');
      inputC2.value = c2.join(',');
      inputC3.value = c3.join(',');
      inputBgUrl.value = bgImageUrl;
      inputSpeed.value = baseRollSpeed;
      inputBorder.value = border;
      inputPower.value = easePower;
      inputTurn.value = currentTurn;
      inputEventInterval.value = eventInterval;
      
      inputEventTrigger.value = eventTrigger;
      checkResetTurnOnEvent.checked = resetTurnOnEvent;
      textResetTurnOnEvent.textContent = resetTurnOnEvent ? "有効" : "無効";
      inputDiceGapRange.value = diceGap;
      inputDiceGapNumber.value = diceGap;
      gapValueDisplay.textContent = diceGap;

      checkShockwave.checked = enableShockwave;
      checkAura.checked = enableAura;
      checkBorderColor.checked = enableBorderColor;

      inputVolume.value = sfxVolume;
      volumeValue.textContent = sfxVolume;
    }

    function applyDiceGap() {
      if (diceGrid) {
        diceGrid.style.gap = `${diceGap}px`;
      }
    }

    inputVolume.addEventListener('input', (e) => {
      volumeValue.textContent = e.target.value;
      sfxVolume = Number(e.target.value);
    });

    function updateTurnDisplay() {
      turnCounter.textContent = currentTurn;
    }

    function updateBackground() {
      const header = document.querySelector('header');
      const headerIcon = document.getElementById('headerIcon');
      const headerTitle = document.getElementById('headerTitle');
      const settingsBtn = document.getElementById('settingsBtn');
      const footer = document.querySelector('footer');
      const turnContainer = turnCounter.parentElement;

      if (bgImageUrl && bgImageUrl.trim() !== "") {
        document.body.style.backgroundColor = "#000000";
        document.body.style.backgroundImage = `url('${bgImageUrl}')`;
        document.body.style.backgroundSize = "contain";
        document.body.style.backgroundPosition = "top center";
        document.body.style.backgroundRepeat = "no-repeat";

        document.body.classList.remove('text-slate-900');
        document.body.classList.add('text-slate-100');

        header.classList.remove('border-slate-200');
        header.classList.add('border-slate-800');
        headerIcon.classList.remove('text-slate-900');
        headerIcon.classList.add('text-slate-100');
        headerTitle.classList.remove('text-slate-900');
        headerTitle.classList.add('text-slate-100');

        settingsBtn.classList.remove('text-slate-700', 'hover:bg-slate-100', 'hover:text-slate-900');
        settingsBtn.classList.add('text-slate-400', 'hover:bg-slate-800', 'hover:text-white');

        turnContainer.classList.remove('bg-slate-100', 'border-slate-200');
        turnContainer.classList.add('bg-slate-900/80', 'border-slate-800');
        turnCounter.classList.remove('text-slate-800');
        turnCounter.classList.add('text-slate-100');

        resetTurnBtn.classList.remove('bg-slate-100', 'hover:bg-slate-200', 'text-slate-600', 'hover:text-slate-850', 'border-slate-200');
        resetTurnBtn.classList.add('bg-slate-800', 'hover:bg-slate-700', 'text-slate-350', 'hover:text-white', 'border-slate-750');

        footer.classList.remove('border-slate-200', 'text-slate-500');
        footer.classList.add('border-slate-800', 'text-slate-400');
      } else {
        document.body.style.backgroundColor = "#ffffff";
        document.body.style.backgroundImage = "none";

        document.body.classList.remove('text-slate-100');
        document.body.classList.add('text-slate-900');

        header.classList.remove('border-slate-800');
        header.classList.add('border-slate-200');
        headerIcon.classList.remove('text-slate-100');
        headerIcon.classList.add('text-slate-900');
        headerTitle.classList.remove('text-slate-100');
        headerTitle.classList.add('text-slate-900');

        settingsBtn.classList.remove('text-slate-400', 'hover:bg-slate-800', 'hover:text-white');
        settingsBtn.classList.add('text-slate-700', 'hover:bg-slate-100', 'hover:text-slate-900');

        turnContainer.classList.remove('bg-slate-900/80', 'border-slate-800');
        turnContainer.classList.add('bg-slate-100', 'border-slate-200');
        turnCounter.classList.remove('text-slate-100');
        turnCounter.classList.add('text-slate-800');

        resetTurnBtn.classList.add('bg-slate-100', 'hover:bg-slate-200', 'text-slate-600', 'hover:text-slate-850', 'border-slate-200');
        resetTurnBtn.classList.remove('bg-slate-800', 'hover:bg-slate-700', 'text-slate-350', 'hover:text-white', 'border-slate-750');

        footer.classList.remove('border-slate-800', 'text-slate-400');
        footer.classList.add('border-slate-200', 'text-slate-500');
      }
    }

    function resetSingleDiceEffect(index) {
      const aura = document.getElementById(`diceAura${index + 1}`);
      const container = containers[index];
      const valSpan = diceStates[index].element;
      const shockwave = document.getElementById(`diceShockwave${index + 1}`);

      aura.className = "absolute -inset-1.5 rounded-2xl opacity-0 blur-md transition-all duration-150 pointer-events-none";
      container.className = "relative w-20 h-20 sm:w-28 sm:h-28 bg-white rounded-2xl flex items-center justify-center shadow-lg border-2 border-slate-300 dice-card cursor-default transition-all duration-150";
      valSpan.className = "text-3xl sm:text-5xl font-black text-slate-950 select-none transition-all duration-150";
      
      shockwave.className = "shockwave";
    }

    function triggerShockwave(index, tier) {
      const shockwave = document.getElementById(`diceShockwave${index + 1}`);
      
      shockwave.className = "shockwave";
      void shockwave.offsetWidth; 

      let colorClass = "";
      
      if (tier === 0) {
        colorClass = "shockwave-slate";
      } else if (tier === 1) {
        colorClass = "shockwave-emerald";
      } else if (tier === 2) {
        colorClass = "shockwave-blue";
      } else if (tier === 3) {
        colorClass = "shockwave-yellow";
      } else if (tier === 4) {
        colorClass = "shockwave-red";
      } else if (tier === 5) {
        colorClass = "shockwave-rainbow";
      }

      shockwave.className = `shockwave animate-shockwave ${colorClass}`;
    }

    function applyDiceEffect(index, value, pool) {
      const aura = document.getElementById(`diceAura${index + 1}`);
      const container = containers[index];
      const valSpan = diceStates[index].element;
      
      const numericPool = pool.map(Number).filter(n => !isNaN(n));
      if (numericPool.length === 0) return;
      
      const minVal = Math.min(...numericPool);
      const maxVal = Math.max(...numericPool);
      const v = Number(value);

      let tier = 0;

      if (isNaN(v)) {
        tier = 0;
      } else if (minVal === maxVal) {
        tier = 5;
      } else if (v === minVal) {
        tier = 0; 
      } else if (v === maxVal) {
        tier = 5; 
      } else {
        const pct = (v - minVal) / (maxVal - minVal);
        if (pct <= 0.25) {
          tier = 1; 
        } else if (pct <= 0.5) {
          tier = 2; 
        } else if (pct <= 0.75) {
          tier = 3; 
        } else {
          tier = 4; 
        }
      }

      aura.className = "absolute -inset-1.5 rounded-2xl opacity-0 blur-md transition-all duration-150 pointer-events-none";
      container.className = "relative w-20 h-20 sm:w-28 sm:h-28 bg-white rounded-2xl flex items-center justify-center shadow-lg border-2 dice-card cursor-default transition-all duration-150";
      valSpan.className = "text-3xl sm:text-5xl font-black select-none transition-all duration-150";

      if (enableAura) {
        if (tier === 0) {
          aura.classList.add("bg-slate-400/50", "opacity-50", "blur-sm");
        } else if (tier === 1) {
          aura.classList.add("bg-emerald-500/50", "opacity-60");
        } else if (tier === 2) {
          aura.classList.add("bg-blue-500/50", "opacity-60");
        } else if (tier === 3) {
          aura.classList.add("bg-yellow-500/50", "opacity-60");
        } else if (tier === 4) {
          aura.classList.add("bg-red-500/60", "opacity-70");
        } else if (tier === 5) {
          aura.classList.add("animate-rainbow-aura", "opacity-90", "blur-lg");
        }
      }

      if (enableBorderColor) {
        if (tier === 0) {
          container.classList.add("border-slate-400", "shadow-[0_0_15px_rgba(148,163,184,0.4)]");
          valSpan.classList.add("text-slate-500");
        } else if (tier === 1) {
          container.classList.add("border-emerald-500", "shadow-[0_0_15px_rgba(16,185,129,0.4)]");
          valSpan.classList.add("text-emerald-500");
        } else if (tier === 2) {
          container.classList.add("border-blue-500", "shadow-[0_0_15px_rgba(59,130,246,0.4)]");
          valSpan.classList.add("text-blue-600");
        } else if (tier === 3) {
          container.classList.add("border-yellow-500", "shadow-[0_0_15px_rgba(234,179,8,0.4)]");
          valSpan.classList.add("text-yellow-600");
        } else if (tier === 4) {
          container.classList.add("border-red-500", "shadow-[0_0_15px_rgba(239,68,68,0.4)]");
          valSpan.classList.add("text-red-600");
        } else if (tier === 5) {
          container.classList.add("rainbow-effect");
          valSpan.classList.add("text-transparent", "bg-clip-text", "bg-gradient-to-br", "from-pink-500", "via-purple-600", "to-blue-600");
        }
      } else {
        container.classList.add("border-slate-300");
        valSpan.classList.add("text-slate-950");
      }

      if (enableShockwave) {
        triggerShockwave(index, tier);
      }
      
      playConfirmSound(tier);
    }

    function saveSettingsFromForm() {
      c1 = parseDiceInput(inputC1.value);
      c2 = parseDiceInput(inputC2.value);
      c3 = parseDiceInput(inputC3.value);
      bgImageUrl = inputBgUrl.value;
      baseRollSpeed = Number(inputSpeed.value) || 120;
      border = Number(inputBorder.value) || 90;
      easePower = Number(inputPower.value) || 3;
      currentTurn = Number(inputTurn.value) || 1;
      eventInterval = Number(inputEventInterval.value) || 5;

      eventTrigger = inputEventTrigger.value;
      resetTurnOnEvent = checkResetTurnOnEvent.checked;
      diceGap = Number(inputDiceGapNumber.value);
      applyDiceGap(); 

      enableShockwave = checkShockwave.checked;
      enableAura = checkAura.checked;
      enableBorderColor = checkBorderColor.checked;
      sfxVolume = Number(inputVolume.value);

      updateBackground();
      updateTurnDisplay();
      resetDiceDisplay();
    }

    function resetDiceDisplay() {
      const val1 = c1[0] !== undefined ? c1[0] : '-';
      const val2 = c2[0] !== undefined ? c2[0] : '-';
      const val3 = c3[0] !== undefined ? c3[0] : '-';
      
      diceValue1.textContent = val1;
      diceValue2.textContent = val2;
      diceValue3.textContent = val3;

      applyDiceEffect(0, val1, c1);
      applyDiceEffect(1, val2, c2);
      applyDiceEffect(2, val3, c3);
    }

    let isRolling = false;

    function tick() {
      if (rollSpeed < 0) {
        finishRoll();
        return;
      }

      diceStates.forEach((state, index) => {
        const individualOffset = 1 + (index * 0.03); 
        
        state.t += Math.max(0, Math.pow((rollSpeed * individualOffset) / border, easePower));

        if (Math.floor(state.t) > Math.floor(state.bt)) {
          const currentVal = dice(state.data());
          state.element.textContent = currentVal;

          playClickSound(index);

          const maxAngle = 20; 
          const progressRatio = rollSpeed / baseRollSpeed; 
          const currentAngle = maxAngle * progressRatio;

          const rotX = (Math.random() - 0.5) * currentAngle * 2;
          const rotY = (Math.random() - 0.5) * currentAngle * 2;
          const scale = 1 + (Math.random() - 0.5) * 0.1 * progressRatio;

          state.container.animate([
            { transform: 'scale(1) rotateX(0deg) rotateY(0deg)' },
            { transform: `scale(${scale}) rotateX(${rotX}deg) rotateY(${rotY}deg)`, offset: 0.15 },
            { transform: 'scale(1) rotateX(0deg) rotateY(0deg)' }
          ], {
            duration: 90, 
            easing: 'ease-out'
          });
        }

        state.bt = state.t;
      });

      rollSpeed--;
      requestAnimationFrame(tick);
    }

    function startRoll() {
      if (isRolling) return;

      const isEventTurn = (currentTurn % eventInterval === 0);

      if (eventTrigger === "start" && isEventTurn) {
        isRolling = true;
        rollBtn.disabled = true;
        rollBtn.classList.add('opacity-50', 'cursor-not-allowed');
        
        triggerEventAnimation();
        
        setTimeout(() => {
          if (resetTurnOnEvent) {
            currentTurn = 1; 
          } else {
            currentTurn++; 
          }
          updateTurnDisplay();
          rollBtn.disabled = false;
          rollBtn.classList.remove('opacity-50', 'cursor-not-allowed');
          isRolling = false;
        }, 2500);
        
        return; 
      }

      isRolling = true;
      rollBtn.disabled = true;
      rollBtn.classList.add('opacity-50', 'cursor-not-allowed');
      statusText.textContent = "超高速ローリング中...";

      diceStates.forEach((state, index) => {
        state.t = 0;
        state.bt = 0;
        resetSingleDiceEffect(index); 
      });

      rollSpeed = baseRollSpeed; 
      requestAnimationFrame(tick);
    }

    function createParticles() {
      particleContainer.innerHTML = '';
      const count = 40; 
      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        const angle = Math.random() * Math.PI * 2;
        const distance = 100 + Math.random() * 300; 
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        
        particle.style.setProperty('--tx', `${tx}px`);
        particle.style.setProperty('--ty', `${ty}px`);
        
        const colors = ['#facc15', '#f59e0b', '#ef4444', '#ffffff'];
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.boxShadow = `0 0 8px ${particle.style.background}`;

        const size = 4 + Math.random() * 8;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;

        particleContainer.appendChild(particle);
      }
    }

    function triggerEventAnimation() {
      eventOverlay.classList.remove('hidden');
      eventOverlay.classList.add('flex');

      eventSlash.classList.add('animate-slash');
      eventText.classList.add('animate-impact');

      createParticles();

      setTimeout(() => {
        eventOverlay.classList.add('hidden');
        eventOverlay.classList.remove('flex');
        eventSlash.classList.remove('animate-slash');
        eventText.classList.remove('animate-impact');
        particleContainer.innerHTML = ''; 
      }, 2500);
    }

    function finishRoll() {
      diceStates.forEach((state, index) => {
        const finalVal = dice(state.data());
        state.element.textContent = finalVal;
        applyDiceEffect(index, finalVal, state.data()); 
      });

      containers.forEach(container => {
        container.animate([
          { transform: 'scale(1)' },
          { transform: 'scale(1.25)', offset: 0.15 },
          { transform: 'scale(0.93)', offset: 0.45 },
          { transform: 'scale(1.02)', offset: 0.75 },
          { transform: 'scale(1)' }
        ], {
          duration: 450,
          easing: 'ease-out'
        });
      });

      statusText.textContent = ""; 

      const isEventTurn = (currentTurn % eventInterval === 0);

      if (eventTrigger === "end" && isEventTurn) {
        setTimeout(() => {
          triggerEventAnimation();
          setTimeout(() => {
            if (resetTurnOnEvent) {
              currentTurn = 1; 
            } else {
              currentTurn++; 
            }
            updateTurnDisplay();
            rollBtn.disabled = false;
            rollBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            isRolling = false;
          }, 2500);
        }, 300); 
      } else {
        currentTurn++;
        updateTurnDisplay();
        rollBtn.disabled = false;
        rollBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        isRolling = false;
      }
    }

    function resetTurn() {
      if (isRolling) return;
      currentTurn = 1;
      updateTurnDisplay();
      statusText.textContent = "ターン数を1にリセットしたよ！";
      setTimeout(() => {
        if (statusText.textContent === "ターン数を1にリセットしたよ！") {
          statusText.textContent = "";
        }
      }, 2000);
    }

    inputDiceGapRange.addEventListener('input', (e) => {
      inputDiceGapNumber.value = e.target.value;
      gapValueDisplay.textContent = e.target.value;
    });
    inputDiceGapNumber.addEventListener('input', (e) => {
      inputDiceGapRange.value = e.target.value;
      gapValueDisplay.textContent = e.target.value;
    });
    checkResetTurnOnEvent.addEventListener('change', (e) => {
      textResetTurnOnEvent.textContent = e.target.checked ? "有効" : "無効";
    });

    rollBtn.addEventListener('click', startRoll);
    resetTurnBtn.addEventListener('click', resetTurn);

    settingsBtn.addEventListener('click', () => {
      if (isRolling) return;
      syncSettingsToForm();
      settingsModal.classList.remove('hidden');
    });

    closeSettingsBtn.addEventListener('click', () => {
      settingsModal.classList.add('hidden');
    });

    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) {
        settingsModal.classList.add('hidden');
      }
    });

    saveSettingsBtn.addEventListener('click', () => {
      saveSettingsFromForm();
      settingsModal.classList.add('hidden');
      statusText.textContent = "設定を保存したよ！";
      setTimeout(() => {
        if (statusText.textContent === "設定を保存したよ！") {
          statusText.textContent = "";
        }
      }, 2000);
    });

    resetDefaultsBtn.addEventListener('click', () => {
      inputC1.value = "1,2,3,4,5,6";
      inputC2.value = "1,2,3,4,5,6";
      inputC3.value = "1,2,3,3,3,9";
      inputBgUrl.value = "./IMG_3640.png";
      inputSpeed.value = 120;
      inputBorder.value = 90;
      inputPower.value = 3;
      inputTurn.value = 1;
      inputEventInterval.value = 5;

      inputEventTrigger.value = "end";
      checkResetTurnOnEvent.checked = true;
      textResetTurnOnEvent.textContent = "有効";
      inputDiceGapRange.value = 160;
      inputDiceGapNumber.value = 160;
      gapValueDisplay.textContent = 160;

      checkShockwave.checked = true;
      checkAura.checked = true;
      checkBorderColor.checked = true;
      inputVolume.value = 20;
      volumeValue.textContent = "20";

      enableShockwave = false;
      enableAura = true;
      enableBorderColor = true;
      sfxVolume = 20;
      
      eventTrigger = "end";
      resetTurnOnEvent = true;
      diceGap = 160;
      applyDiceGap();
    });

    syncSettingsToForm();
    applyDiceGap(); 
    updateBackground();
    resetDiceDisplay();
    updateTurnDisplay();
  </script>
</body>
</html>
